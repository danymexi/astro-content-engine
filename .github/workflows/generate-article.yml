name: Generate Article

on:
  schedule:
    # Mon, Wed, Fri at 08:00 UTC
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Specific topic ID from topic-queue.json (leave empty for auto-pick)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ inputs.topic_id }}" ]; then
            node scripts/generate-article.mjs --topic-id=${{ inputs.topic_id }}
          else
            node scripts/generate-article.mjs
          fi

      - name: Generate OG images
        run: node scripts/generate-post-og.mjs

      - name: Regenerate llms.txt
        run: node scripts/generate-llms.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "feat: auto-generate article $(date +%Y-%m-%d)"
          git push
